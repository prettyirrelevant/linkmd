name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate release tag
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="$(jq -r '.version' package.json)"
          test "$TAG" = "v$version" || {
            echo "Tag $TAG does not match package version $version" >&2
            exit 1
          }
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: bun ci

      - name: Check types
        run: bun run typecheck

      - name: Run tests
        run: bun run test

  build:
    needs:
      - validate
      - test
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: bun-linux-x64-baseline
            asset: linux-x64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: linux-arm64
          - runner: macos-26-intel
            target: bun-darwin-x64
            asset: darwin-x64
          - runner: macos-26
            target: bun-darwin-arm64
            asset: darwin-arm64

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: bun ci

      - name: Build executable
        env:
          TARGET: ${{ matrix.target }}
        run: |
          bun build src/main.ts \
            --compile \
            --target="$TARGET" \
            --minify \
            --no-compile-autoload-dotenv \
            --no-compile-autoload-bunfig \
            --outfile dist/linkmd

      - name: Smoke test executable
        run: ./dist/linkmd --help

      - name: Package executable
        env:
          ASSET: ${{ matrix.asset }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: tar -czf "linkmd-$VERSION-$ASSET.tar.gz" -C dist linkmd

      - name: Upload executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.asset }}
          path: linkmd-${{ needs.validate.outputs.version }}-${{ matrix.asset }}.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download executables
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        working-directory: release
        run: |
          assets=(linkmd-*.tar.gz)
          test "${#assets[@]}" -eq 4
          LC_ALL=C sha256sum "${assets[@]}" > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Attest release assets
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: release/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            release/linkmd-*.tar.gz \
            release/SHA256SUMS \
            --verify-tag \
            --generate-notes
