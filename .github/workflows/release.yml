name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate release tag
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="$(jq -r '.version' package.json)"
          test "$TAG" = "v$version" || {
            echo "Tag $TAG does not match package version $version" >&2
            exit 1
          }
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: bun ci

      - name: Check types
        run: bun run typecheck

      - name: Run tests
        run: bun run test

  build:
    needs:
      - validate
      - test
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os: linux
            target: bun-linux-x64-baseline
            asset: linux-x64
            executable: linkmd
            extension: tar.gz
          - runner: ubuntu-24.04-arm
            os: linux
            target: bun-linux-arm64
            asset: linux-arm64
            executable: linkmd
            extension: tar.gz
          - runner: macos-26-intel
            os: darwin
            target: bun-darwin-x64
            asset: darwin-x64
            executable: linkmd
            extension: tar.gz
          - runner: macos-26
            os: darwin
            target: bun-darwin-arm64
            asset: darwin-arm64
            executable: linkmd
            extension: tar.gz
          - runner: windows-2025
            os: windows
            # Avoid Bun's separate target-runtime download for a native Windows build.
            target: ""
            asset: windows-x64
            executable: linkmd.exe
            extension: zip
          - runner: windows-11-arm
            os: windows
            target: ""
            asset: windows-arm64
            executable: linkmd.exe
            extension: zip

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: bun ci

      - name: Build executable
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          target_args=()
          if [[ -n "$TARGET" ]]; then
            target_args+=(--target="$TARGET")
          fi
          bun build src/main.ts \
            --compile \
            "${target_args[@]}" \
            --minify \
            --no-compile-autoload-dotenv \
            --no-compile-autoload-bunfig \
            --outfile dist/linkmd

      - name: Smoke test executable
        run: ./dist/${{ matrix.executable }} --help

      - name: Package executable for Unix
        if: matrix.os != 'windows'
        env:
          ASSET: ${{ matrix.asset }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: tar -czf "linkmd-$VERSION-$ASSET.tar.gz" -C dist linkmd

      - name: Package executable for Windows
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          ASSET: ${{ matrix.asset }}
          EXECUTABLE: ${{ matrix.executable }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: Compress-Archive -Path "dist/$env:EXECUTABLE" -DestinationPath "linkmd-$env:VERSION-$env:ASSET.zip"

      - name: Upload executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.asset }}
          path: linkmd-${{ needs.validate.outputs.version }}-${{ matrix.asset }}.${{ matrix.extension }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download executables
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        working-directory: release
        run: |
          shopt -s nullglob
          assets=(linkmd-*.tar.gz linkmd-*.zip)
          test "${#assets[@]}" -eq 6
          LC_ALL=C sha256sum "${assets[@]}" > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Attest release assets
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: release/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            release/linkmd-*.tar.gz \
            release/linkmd-*.zip \
            release/SHA256SUMS \
            --verify-tag \
            --generate-notes
